---
name: tanzubench
icon_file: resources/icon.png
label: TanzuBench
description: |
  Open benchmark suite for LLMs running on the Tanzu GenAI tile.
  99 tests across 18 categories measuring real-world model usability
  on CPU and GPU foundations.
metadata_version: 3.0

requires_product_versions:
  - name: cf
    version: "~> 4.0"

stemcell_criteria:
  os: ubuntu-jammy
  version: "1.0"

# ── Properties (OpsManager form fields) ────────────────────────────
forms:
  - name: genai_local
    label: Local GenAI Service
    description: Bind to the GenAI tile on this foundation via CF marketplace
    properties:
      - name: genai_offering_name
        type: string
        label: GenAI Offering Name
        description: "Service offering name in CF marketplace (e.g., 'tanzu-ai')"
        configurable: true
        default: ""
        optional: true
      - name: genai_plan_name
        type: string
        label: GenAI Plan Name
        description: "Plan name (e.g., 'all-models')"
        configurable: true
        default: ""
        optional: true
      - name: genai_model_name
        type: string
        label: Model Name
        description: "Model to benchmark (e.g., 'google/gemma-4-31B-it')"
        configurable: true
      - name: genai_engine
        type: dropdown_select
        label: Engine
        options:
          - name: vllm
            label: vLLM
          - name: ollama
            label: Ollama
        default: vllm
        configurable: true
      - name: hardware_type
        type: dropdown_select
        label: Hardware Type
        options:
          - name: gpu
            label: GPU
          - name: cpu
            label: CPU
        default: gpu
        configurable: true

  - name: external_foundations
    label: External Foundations
    description: Configure endpoints on other foundations to benchmark
    optional: true
    properties:
      - name: ext_foundation_1_name
        type: string
        label: Foundation 1 Name
        default: ""
        optional: true
      - name: ext_foundation_1_endpoint
        type: string
        label: Foundation 1 Endpoint URL
        default: ""
        optional: true
      - name: ext_foundation_1_api_key
        type: secret
        label: Foundation 1 API Key
        optional: true
      - name: ext_foundation_1_model
        type: string
        label: Foundation 1 Model Name
        default: ""
        optional: true
      - name: ext_foundation_1_hardware
        type: dropdown_select
        label: Foundation 1 Hardware
        options:
          - name: gpu
            label: GPU
          - name: cpu
            label: CPU
        default: gpu
      - name: ext_foundation_2_name
        type: string
        label: Foundation 2 Name
        default: ""
        optional: true
      - name: ext_foundation_2_endpoint
        type: string
        label: Foundation 2 Endpoint URL
        default: ""
        optional: true
      - name: ext_foundation_2_api_key
        type: secret
        label: Foundation 2 API Key
        optional: true
      - name: ext_foundation_2_model
        type: string
        label: Foundation 2 Model Name
        default: ""
        optional: true
      - name: ext_foundation_2_hardware
        type: dropdown_select
        label: Foundation 2 Hardware
        options:
          - name: gpu
            label: GPU
          - name: cpu
            label: CPU
        default: gpu

  - name: judge_config
    label: Judge Configuration
    description: Select which foundation's model serves as the LLM judge
    properties:
      - name: judge_source
        type: dropdown_select
        label: Judge Source
        description: "Which foundation's model to use as judge"
        options:
          - name: local
            label: Local Foundation
          - name: external_1
            label: External Foundation 1
          - name: external_2
            label: External Foundation 2
          - name: none
            label: No Judge (skip judge-graded categories)
        default: none
        configurable: true

  - name: runner_settings
    label: Runner Settings
    properties:
      - name: task_timeout
        type: integer
        label: Per-test timeout (seconds)
        description: "0 = use defaults. Set to 120 for CPU models."
        default: 0
        configurable: true
      - name: suppress_thinking
        type: boolean
        label: Suppress thinking tokens
        default: true
        configurable: true
      - name: tile_version_label
        type: string
        label: GenAI Tile Version
        optional: true
        configurable: true
      - name: leaderboard_route_prefix
        type: string
        label: Leaderboard Route Prefix
        default: tanzubench
        configurable: true
      - name: export_enabled
        type: boolean
        label: Enable Result Export
        default: true
        configurable: true

# ── CF accessor properties ──────────────────────────────────────────
property_blueprints:
  - name: cf_api_url
    type: string
    configurable: false
  - name: cf_admin_user
    type: string
    configurable: false
  - name: cf_admin_password
    type: secret
    configurable: false
  - name: cf_skip_ssl
    type: boolean
    configurable: false

# ── Packages (BOSH jobs + errands) ─────────────────────────────────
packages:
  - name: tanzubench
    type: bosh-release
    path: resources/tanzubench-release.tgz
    jobs:
      # Web UI — local leaderboard + run trigger
      - name: tanzubench-web
        templates:
          - name: tanzubench-web
            release: tanzubench
        properties:
          tanzubench:
            # Local foundation — marketplace binding
            genai_offering_name: (( .properties.genai_offering_name.value ))
            genai_plan_name: (( .properties.genai_plan_name.value ))
            genai_model_name: (( .properties.genai_model_name.value ))
            genai_engine: (( .properties.genai_engine.value ))
            hardware_type: (( .properties.hardware_type.value ))
            # External foundation 1
            ext_foundation_1_name: (( .properties.ext_foundation_1_name.value ))
            ext_foundation_1_endpoint: (( .properties.ext_foundation_1_endpoint.value ))
            ext_foundation_1_api_key: (( .properties.ext_foundation_1_api_key.value ))
            ext_foundation_1_model: (( .properties.ext_foundation_1_model.value ))
            ext_foundation_1_hardware: (( .properties.ext_foundation_1_hardware.value ))
            # External foundation 2
            ext_foundation_2_name: (( .properties.ext_foundation_2_name.value ))
            ext_foundation_2_endpoint: (( .properties.ext_foundation_2_endpoint.value ))
            ext_foundation_2_api_key: (( .properties.ext_foundation_2_api_key.value ))
            ext_foundation_2_model: (( .properties.ext_foundation_2_model.value ))
            ext_foundation_2_hardware: (( .properties.ext_foundation_2_hardware.value ))
            # Judge
            judge_source: (( .properties.judge_source.value ))
            # Runner settings
            task_timeout: (( .properties.task_timeout.value ))
            suppress_thinking: (( .properties.suppress_thinking.value ))
            tile_version: (( .properties.tile_version_label.value ))
            leaderboard_route_prefix: (( .properties.leaderboard_route_prefix.value ))
            export_enabled: (( .properties.export_enabled.value ))
            # CF credentials for marketplace binding
            cf_system_domain: (( ..cf.cloud_controller.system_domain.value ))
            cf_admin_user: (( ..cf.uaa.system_services_credentials.identity ))
            cf_admin_password: (( ..cf.uaa.system_services_credentials.password ))
            cf_skip_ssl: true

      # Run benchmarks errand
      - name: run-benchmarks
        templates:
          - name: run-benchmarks
            release: tanzubench
        lifecycle: errand
        post_deploy: false
        properties:
          tanzubench:
            genai_offering_name: (( .properties.genai_offering_name.value ))
            genai_plan_name: (( .properties.genai_plan_name.value ))
            genai_model_name: (( .properties.genai_model_name.value ))
            genai_engine: (( .properties.genai_engine.value ))
            hardware_type: (( .properties.hardware_type.value ))
            ext_foundation_1_name: (( .properties.ext_foundation_1_name.value ))
            ext_foundation_1_endpoint: (( .properties.ext_foundation_1_endpoint.value ))
            ext_foundation_1_api_key: (( .properties.ext_foundation_1_api_key.value ))
            ext_foundation_1_model: (( .properties.ext_foundation_1_model.value ))
            ext_foundation_1_hardware: (( .properties.ext_foundation_1_hardware.value ))
            ext_foundation_2_name: (( .properties.ext_foundation_2_name.value ))
            ext_foundation_2_endpoint: (( .properties.ext_foundation_2_endpoint.value ))
            ext_foundation_2_api_key: (( .properties.ext_foundation_2_api_key.value ))
            ext_foundation_2_model: (( .properties.ext_foundation_2_model.value ))
            ext_foundation_2_hardware: (( .properties.ext_foundation_2_hardware.value ))
            judge_source: (( .properties.judge_source.value ))
            task_timeout: (( .properties.task_timeout.value ))
            suppress_thinking: (( .properties.suppress_thinking.value ))
            tile_version: (( .properties.tile_version_label.value ))
            cf_system_domain: (( ..cf.cloud_controller.system_domain.value ))
            cf_admin_user: (( ..cf.uaa.system_services_credentials.identity ))
            cf_admin_password: (( ..cf.uaa.system_services_credentials.password ))
            cf_skip_ssl: true

      # Export results errand
      - name: export-results
        templates:
          - name: export-results
            release: tanzubench
        lifecycle: errand
        post_deploy: false
        properties:
          tanzubench:
            export_enabled: (( .properties.export_enabled.value ))

      # Smoke tests
      - name: smoke-tests
        templates:
          - name: smoke-tests
            release: tanzubench
        lifecycle: errand
        post_deploy: true
        properties:
          tanzubench:
            genai_offering_name: (( .properties.genai_offering_name.value ))
            genai_model_name: (( .properties.genai_model_name.value ))
            cf_system_domain: (( ..cf.cloud_controller.system_domain.value ))
            cf_admin_user: (( ..cf.uaa.system_services_credentials.identity ))
            cf_admin_password: (( ..cf.uaa.system_services_credentials.password ))
            cf_skip_ssl: true


# routing release removed for MVP — gorouter integration is a follow-up
